name: CI

on:
  push:
    branches: [main, "main-*"]
  pull_request:

jobs:
  backend:
    name: backend (lint + type + pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install nmap
        # 대부분 테스트는 fixture XML·명령조립만 쓰지만, 단계 엔진 재스캔 테스트는
        # find_nmap() 가 바이너리를 찾아야 진행되므로 nmap 을 설치한다(워커는 스텁).
        run: sudo apt-get update && sudo apt-get install -y nmap
      - name: Install deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .
      - name: Type check (mypy)
        working-directory: backend
        run: mypy scanops
      - name: Run tests
        working-directory: backend
        run: python -m pytest -q

  frontend:
    name: frontend (lint + unit + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Lint (eslint)
        working-directory: frontend
        run: npm run lint
      - name: Unit tests (vitest)
        working-directory: frontend
        run: npm test
      - name: Build
        working-directory: frontend
        run: npm run build

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Build SPA
        working-directory: frontend
        run: npm run build
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run E2E
        working-directory: frontend
        # serve.sh 가 데이터 시드 후 FastAPI 로 dist+API 를 서빙(같은 오리진). nmap 불필요.
        run: npx playwright test
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
          if-no-files-found: ignore
